name: Feature request
description: Suggest an improvement or new feature for Cpaste
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is missing or inconvenient today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before submitting this request
          required: true
